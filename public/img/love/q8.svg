<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280">
  <defs>
    <linearGradient id="q8-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="60%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="q8-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <rect width="420" height="280" fill="url(#q8-sky)"/>
  <!-- Ground -->
  <rect x="0" y="210" width="420" height="70" fill="url(#q8-ground)" rx="0"/>
  <!-- Hills -->
  <ellipse cx="80" cy="212" rx="110" ry="30" fill="#4ade80"/>
  <ellipse cx="340" cy="214" rx="120" ry="28" fill="#22c55e"/>
  <ellipse cx="210" cy="215" rx="90" ry="22" fill="#86efac"/>

  <!-- Clouds -->
  <ellipse cx="80" cy="55" rx="45" ry="22" fill="white" opacity="0.9"/>
  <ellipse cx="110" cy="48" rx="35" ry="18" fill="white" opacity="0.9"/>
  <ellipse cx="55" cy="60" rx="30" ry="15" fill="white" opacity="0.85"/>

  <ellipse cx="320" cy="70" rx="40" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="348" cy="63" rx="30" ry="15" fill="white" opacity="0.85"/>

  <!-- Airplane -->
  <!-- Fuselage -->
  <ellipse cx="210" cy="118" rx="75" ry="16" fill="white" transform="rotate(-20 210 118)"/>
  <!-- Wings -->
  <path d="M190 120 L150 148 L175 140 L200 128 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1"/>
  <path d="M225 108 L265 80 L245 94 L215 112 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1"/>
  <!-- Tail -->
  <path d="M280 100 L295 80 L285 100 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1"/>
  <!-- Windows -->
  <circle cx="230" cy="112" r="5" fill="#bae6fd"/>
  <circle cx="218" cy="116" r="5" fill="#bae6fd"/>
  <circle cx="206" cy="120" r="5" fill="#bae6fd"/>
  <!-- Trail -->
  <path d="M140 144 Q120 155 90 160" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7" stroke-dasharray="8,5"/>

  <!-- Palm tree (beach/tropical) -->
  <rect x="355" y="168" width="8" height="48" rx="4" fill="#92400e"/>
  <!-- Leaves -->
  <path d="M359 170 C380 155 395 148 388 165 C380 178 359 170 359 170" fill="#22c55e"/>
  <path d="M359 170 C338 155 323 148 330 165 C338 178 359 170 359 170" fill="#16a34a"/>
  <path d="M359 170 C362 148 368 133 378 148 C382 162 359 170 359 170" fill="#22c55e"/>
  <!-- Coconuts -->
  <circle cx="362" cy="172" r="5" fill="#92400e"/>
  <circle cx="354" cy="174" r="4.5" fill="#78350f"/>

  <!-- Mountain (nature/healing) -->
  <path d="M30 213 L85 155 L140 213 Z" fill="#6b7280" opacity="0.7"/>
  <path d="M58 213 L100 162 L148 213 Z" fill="#9ca3af" opacity="0.6"/>
  <!-- Snow cap -->
  <path d="M85 155 L75 175 L95 175 Z" fill="white" opacity="0.9"/>

  <!-- Hearts on airplane trail -->
  <path d="M105 168 C107 164 112 164 112 168 C112 172 108 175 105 178 C102 175 98 172 98 168 C98 164 103 164 105 168" fill="#f43f5e" opacity="0.6"/>

  <text x="210" y="268" text-anchor="middle" font-size="13" fill="#0c4a6e" opacity="0.8" font-family="sans-serif">어떤 여행이 더 설레?</text>
</svg>
