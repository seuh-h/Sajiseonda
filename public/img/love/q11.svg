<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280">
  <defs>
    <linearGradient id="q11-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#fff0f3"/>
    </linearGradient>
  </defs>
  <rect width="420" height="280" fill="url(#q11-bg)"/>

  <!-- Center: You (the user figure, neutral position) -->
  <circle cx="210" cy="128" r="26" fill="#fecdd3" stroke="#f43f5e" stroke-width="2"/>
  <ellipse cx="210" cy="182" rx="22" ry="34" fill="#fecdd3" stroke="#f43f5e" stroke-width="2"/>
  <!-- Face (neutral/thinking) -->
  <circle cx="204" cy="124" r="3" fill="#be123c" opacity="0.7"/>
  <circle cx="216" cy="124" r="3" fill="#be123c" opacity="0.7"/>
  <path d="M205 133 Q210 138 215 133" stroke="#be123c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Heart on chest -->
  <path d="M210 170 C212 166 218 166 218 170 C218 174 214 177 210 180 C206 177 202 174 202 170 C202 166 208 166 210 170" fill="#f43f5e" opacity="0.7"/>

  <!-- LEFT: Friend group (activity, laughing) -->
  <!-- Background circle -->
  <ellipse cx="82" cy="135" rx="62" ry="55" fill="#a78bfa" opacity="0.1"/>
  <!-- Friend 1 -->
  <circle cx="62" cy="118" r="20" fill="#a78bfa" opacity="0.85"/>
  <ellipse cx="62" cy="155" rx="17" ry="26" fill="#a78bfa" opacity="0.8"/>
  <!-- Friend 2 -->
  <circle cx="102" cy="112" r="18" fill="#8b5cf6" opacity="0.85"/>
  <ellipse cx="102" cy="148" rx="15" ry="24" fill="#8b5cf6" opacity="0.8"/>
  <!-- Laughter bubbles -->
  <rect x="40" y="82" width="40" height="20" rx="10" fill="white" opacity="0.85"/>
  <path d="M52 102 L45 112 L60 102 Z" fill="white" opacity="0.85"/>
  <text x="60" y="96" text-anchor="middle" font-size="9" fill="#7c3aed" font-family="sans-serif" font-weight="bold">하하</text>
  <rect x="84" y="76" width="40" height="20" rx="10" fill="white" opacity="0.75"/>
  <path d="M96 96 L89 106 L104 96 Z" fill="white" opacity="0.75"/>
  <text x="104" y="90" text-anchor="middle" font-size="9" fill="#7c3aed" font-family="sans-serif" font-weight="bold">호호</text>

  <!-- Arrow from center figure toward left group -->
  <path d="M184 160 L130 155" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <defs>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#a78bfa" opacity="0.8"/>
    </marker>
    <marker id="arrow-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#f43f5e" opacity="0.8"/>
    </marker>
  </defs>

  <!-- RIGHT: You alone (or with partner waiting) -->
  <ellipse cx="338" cy="135" rx="62" ry="55" fill="#fda4af" opacity="0.1"/>
  <!-- Waiting figure (you, or your partner waiting) -->
  <circle cx="338" cy="115" r="22" fill="#fecdd3" opacity="0.8"/>
  <ellipse cx="338" cy="155" rx="18" ry="28" fill="#fecdd3" opacity="0.75"/>
  <!-- Clock above -->
  <circle cx="338" cy="75" r="18" fill="white" stroke="#fda4af" stroke-width="2"/>
  <line x1="338" y1="75" x2="338" y2="65" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
  <line x1="338" y1="75" x2="346" y2="78" stroke="#9f1239" stroke-width="2" stroke-linecap="round"/>

  <!-- Arrow from center toward right (you/partner) -->
  <path d="M236 160 L290 155" stroke="#f43f5e" stroke-width="2.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-pink)"/>

  <!-- Label -->
  <text x="82" y="205" text-anchor="middle" font-size="10" fill="#7c3aed" opacity="0.8" font-family="sans-serif">활발한 외출</text>
  <text x="338" y="205" text-anchor="middle" font-size="10" fill="#be123c" opacity="0.8" font-family="sans-serif">나와 함께</text>

  <text x="210" y="252" text-anchor="middle" font-size="13" fill="#9f1239" opacity="0.7" font-family="sans-serif">연인이 친구들과 자주 노는 건?</text>
</svg>
