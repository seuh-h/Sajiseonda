<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280">
  <defs>
    <linearGradient id="q3-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#fff0f3"/>
    </linearGradient>
  </defs>
  <rect width="420" height="280" fill="url(#q3-bg)"/>

  <!-- Speech bubble 1: words (top left) -->
  <rect x="30" y="50" width="130" height="72" rx="18" fill="#f43f5e" opacity="0.9"/>
  <path d="M60 122 L50 140 L78 122 Z" fill="#f43f5e" opacity="0.9"/>
  <!-- "사랑해" text representation -->
  <text x="95" y="82" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif" font-weight="bold">사랑해 ♡</text>
  <text x="95" y="100" text-anchor="middle" font-size="10" fill="white" font-family="sans-serif" opacity="0.9">보고 싶어 ~</text>

  <!-- Speech bubble 2: heart (top right) -->
  <rect x="260" y="40" width="130" height="80" rx="18" fill="#a855f7" opacity="0.85"/>
  <path d="M300 120 L290 138 L318 120 Z" fill="#a855f7" opacity="0.85"/>
  <!-- Large heart inside -->
  <path d="M325 68 C328 60 340 60 340 68 C340 77 333 83 325 90 C317 83 310 77 310 68 C310 60 322 60 325 68" fill="white" opacity="0.9"/>
  <path d="M305 72 C307 67 313 67 313 72 C313 77 309 80 305 83 C301 80 297 77 297 72 C297 67 303 67 305 72" fill="white" opacity="0.6"/>

  <!-- Speech bubble 3: action/star (bottom center) -->
  <rect x="140" y="150" width="140" height="72" rx="18" fill="#fb7185" opacity="0.85"/>
  <path d="M190 222 L178 240 L208 222 Z" fill="#fb7185" opacity="0.85"/>
  <!-- Action symbols -->
  <path d="M178 183 L181 192 L191 192 L183 198 L186 208 L178 202 L170 208 L173 198 L165 192 L175 192 Z" fill="white" opacity="0.9"/>
  <!-- Eye/look symbol -->
  <ellipse cx="228" cy="194" rx="18" ry="12" fill="white" opacity="0.25"/>
  <circle cx="228" cy="194" r="7" fill="white" opacity="0.7"/>
  <circle cx="230" cy="192" r="3" fill="#fb7185" opacity="0.9"/>

  <!-- Small floating hearts -->
  <path d="M220 35 C222 30 228 30 228 35 C228 40 224 43 220 47 C216 43 212 40 212 35 C212 30 218 30 220 35" fill="#f43f5e" opacity="0.5"/>
  <path d="M380 85 C382 80 388 80 388 85 C388 90 384 93 380 97 C376 93 372 90 372 85 C372 80 378 80 380 85" fill="#a855f7" opacity="0.4"/>

  <text x="210" y="258" text-anchor="middle" font-size="13" fill="#9f1239" opacity="0.7" font-family="sans-serif">어떤 표현 방식이 더 좋아?</text>
</svg>
