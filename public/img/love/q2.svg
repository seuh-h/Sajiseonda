  <path d="M148 105 L150 112 L157 114 L150 116 L148 123 L146 116 L139 114 L146 112 Z" fill="#fbbf24" opacity="0.8"/>
  <path d="M275 110 L276.5 115 L282 116.5 L276.5 118 L275 123 L273.5 118 L268 116.5 L273.5 115 Z" fill="#f43f5e" opacity="0.6"/>
  <circle cx="360" cy="108" r="4" fill="#fda4af" opacity="0.7"/>
  <circle cx="72" cy="120" r="3.5" fill="#fbbf24" opacity="0.65"/>

  <text x="210" y="255" text-anchor="middle" font-size="13" fill="#9f1239" opacity="0.7" font-family="sans-serif">어떤 선물이 더 설레?</text>
