  <rect x="99" y="130" width="12" height="90" fill="#fbbf24" opacity="0.9"/>
  <!-- Ribbon horizontal -->
  <rect x="55" y="158" width="100" height="10" fill="#fbbf24" opacity="0.9"/>
  <!-- Bow -->
  <ellipse cx="105" cy="130" rx="20" ry="10" fill="#fbbf24" transform="rotate(-30 105 130)" opacity="0.9"/>
  <ellipse cx="105" cy="130" rx="20" ry="10" fill="#fbbf24" transform="rotate(30 105 130)" opacity="0.9"/>
  <circle cx="105" cy="130" r="7" fill="#f59e0b"/>

  <!-- Cake (center) -->
  <ellipse cx="210" cy="148" rx="38" ry="12" fill="#fda4af"/>
  <rect x="172" y="148" width="76" height="55" rx="4" fill="#fecdd3"/>
