  <path d="M265 148 L312 188 L360 148" stroke="#fda4af" stroke-width="2" fill="none"/>
  <path d="M265 148 L312 188 L360 148 Z" fill="#fff0f3" opacity="0.6"/>
  <!-- Heart seal -->
  <path d="M312 175 C314 171 320 171 320 175 C320 179 316 182 312 185 C308 182 304 179 304 175 C304 171 310 171 312 175" fill="#f43f5e"/>

