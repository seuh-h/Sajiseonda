<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280">
  <defs>
    <linearGradient id="q1-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0f3"/>
      <stop offset="100%" stop-color="#ffe4e6"/>
    </linearGradient>
  </defs>
  <rect width="420" height="280" fill="url(#q1-bg)"/>

  <!-- Soft glow behind figures -->
  <ellipse cx="210" cy="185" rx="130" ry="70" fill="#fda4af" opacity="0.15"/>

  <!-- Left figure (sad/tired) - head tilted slightly down -->
  <circle cx="148" cy="115" r="32" fill="#fecdd3"/>
  <ellipse cx="148" cy="185" rx="28" ry="42" fill="#fda4af"/>
  <!-- Downward facial expression hint -->
  <path d="M138 118 Q148 124 158 118" stroke="#f43f5e" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Right figure (comforting) -->
  <circle cx="272" cy="108" r="32" fill="#fecdd3"/>
  <ellipse cx="272" cy="178" rx="28" ry="42" fill="#f43f5e"/>
  <!-- Smile -->
  <path d="M262 113 Q272 120 282 113" stroke="#be123c" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Arm reaching across from right figure to left -->
  <path d="M248 160 Q210 148 188 162" stroke="#f43f5e" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Hand -->
  <circle cx="183" cy="163" r="10" fill="#fecdd3"/>

  <!-- Floating hearts -->
  <path d="M175 75 C177 69 185 69 185 75 C185 81 180 85 175 90 C170 85 165 81 165 75 C165 69 173 69 175 75" fill="#f43f5e" opacity="0.7"/>
  <path d="M210 55 C212 50 218 50 218 55 C218 60 214 63 210 67 C206 63 202 60 202 55 C202 50 208 50 210 55" fill="#fb7185" opacity="0.6"/>
  <path d="M240 70 C242 65 248 65 248 70 C248 75 244 78 240 82 C236 78 232 75 232 70 C232 65 238 65 240 70" fill="#fda4af" opacity="0.5"/>

  <!-- Label hint -->
  <text x="210" y="255" text-anchor="middle" font-size="13" fill="#9f1239" opacity="0.7" font-family="sans-serif">위로하는 방식이 어떤 게 좋아?</text>
</svg>
