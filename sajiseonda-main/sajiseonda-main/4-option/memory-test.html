<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사지선다 - 기억력 테스트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fbfbfd;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1d1d1f;
            overflow: hidden;
        }

        /* 1. 시작 화면 스타일 */
        #start-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #start-screen img {
            width: 450px; /* 로고 크기 확장 */
            margin-bottom: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .difficulty-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 20px 40px;
            font-size: 22px; /* 버튼 크기 확장 */
            font-weight: bold;
            border: 2px solid #d2d2d7;
            border-radius: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background-color: #f5f5f7; border-color: #0071e3; color: #0071e3; transform: translateY(-3px); }

        /* 2. 카운트다운 오버레이 */
        #countdown-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            font-size: 150px;
            font-weight: bold;
            color: #0071e3;
        }

        /* 3. 게임 화면 스타일 */
        #game-screen { display: none; text-align: center; width: 100%; }
        
        #status-text { font-size: 32px; font-weight: bold; margin-bottom: 30px; color: #1d1d1f; }

        /* 그리드 컨테이너 대형화 */
        #grid-container {
            display: grid;
            gap: 20px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            max-width: 90vw;
            width: fit-content;
        }

        /* 동그라미 타일 대형화 */
        .tile {
            width: 140px; /* 기본 타일 크기 증가 */
            height: 140px;
            border-radius: 50%;
            border: 3px solid #000;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
            opacity: 0.5;
        }

        /* 난이도별 타일 크기 자동 조절 (화면 꽉 차게) */
        .grid-5x5 .tile { width: 100px; height: 100px; }
        .grid-4x4 .tile { width: 120px; height: 120px; }

        .tile:active { transform: scale(0.92); }
        .tile.active { opacity: 1; box-shadow: 0 0 30px rgba(0,0,0,0.4); transform: scale(1.08); border-color: #fff; }

        /* 다채로운 색상 팔레트 (최대 25개) */
        .color-0 { background-color: #ff3b30; } 
        .color-1 { background-color: #330be2; } 
        .color-2 { background-color: #01ff95; } 
        .color-3 { background-color: #ddec00; } 
        .color-4 { background-color: #5856d6; } 
        .color-5 { background-color: #ff9500; }
        .color-6 { background-color: #af52de; } 
        .color-7 { background-color: #5ac8fa; }
        .color-8 { background-color: #ff2d55; } 
        .color-9 { background-color: #a2845e; }
        .color-10 { background-color: #1abc9c; } 
        .color-11 { background-color: #2ecc71; }
        .color-12 { background-color: #3498db; } 
        .color-13 { background-color: #9b59b6; }
        .color-14 { background-color: #f1c40f; } 
        .color-15 { background-color: #e67e22; }
        .color-16 { background-color: #e74c3c; } 
        .color-17 { background-color: #34495e; }
        .color-18 { background-color: #7f8c8d; } 
        .color-19 { background-color: #d35400; }
        .color-20 { background-color: #c0392b; } 
        .color-21 { background-color: #16a085; }
        .color-22 { background-color: #27ae60; } 
        .color-23 { background-color: #2980b9; }
        .color-24 { background-color: #8e44ad; }

        /* 결과 화면 */
        #game-over { display: none; margin-top: 30px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="img/memory.png" alt="Memory Logo">
        <h2 style="font-size: 36px; margin-bottom: 30px;">난이도를 선택하세요</h2>
        <div class="difficulty-container">
            <button class="btn" onclick="prepareGame(2)">쉬움</button>
            <button class="btn" onclick="prepareGame(3)">보통</button>
            <button class="btn" onclick="prepareGame(4)">어려움</button>
            <button class="btn" onclick="prepareGame(5)">챌린지</button>
        </div>
    </div>

    <div id="countdown-overlay">3</div>

    <div id="game-screen">
        <div id="status-text">준비하세요!</div>
        <div id="grid-container"></div>
        
        <div id="game-over">
            <h3 style="color: #ff3b30; font-size: 40px; margin-bottom: 10px;">GAME OVER</h3>
            <p id="final-score" style="font-size: 24px; margin-bottom: 25px;"></p>
            <button class="btn" onclick="location.reload()">메인으로</button>
        </div>
    </div>

    <script>
        let gameSequence = [];
        let userSequence = [];
        let level = 0;
        let gridSize = 2;
        let isWaitingForUser = false;

        const gridContainer = document.getElementById('grid-container');
        const statusText = document.getElementById('status-text');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const countdownOverlay = document.getElementById('countdown-overlay');

        // 게임 시작 전 카운트다운 로직
        function prepareGame(size) {
            gridSize = size;
            startScreen.style.display = 'none';
            countdownOverlay.style.display = 'flex';
            
            let count = 3;
            countdownOverlay.textContent = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownOverlay.textContent = count;
                } else if (count === 0) {
                    countdownOverlay.textContent = "START!";
                } else {
                    clearInterval(timer);
                    countdownOverlay.style.display = 'none';
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            gameScreen.style.display = 'block';
            
            gridContainer.className = `grid-${gridSize}x5`; 
            gridContainer.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            createTiles(gridSize * gridSize);
            nextLevel();
        }

        function createTiles(count) {
            gridContainer.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.classList.add(`color-${i}`); // 25개 색상 클래스 적용
                tile.dataset.index = i;
                tile.addEventListener('click', onTileClick);
                gridContainer.appendChild(tile);
            }
        }

        async function nextLevel() {
            level++;
            userSequence = [];
            isWaitingForUser = false;
            statusText.textContent = `레벨 ${level}: 기억하세요!`;
            
            const randomIndex = Math.floor(Math.random() * (gridSize * gridSize));
            gameSequence.push(randomIndex);
            
            await sleep(800);
            await playSequence();
            
            isWaitingForUser = true;
            statusText.textContent = `당신의 차례! (${userSequence.length}/${gameSequence.length})`;
        }

        async function playSequence() {
            const speed = Math.max(200, 600 - (level * 30)); // 레벨이 오를수록 조금씩 빨라짐
            for (let index of gameSequence) {
                await flashTile(index, speed);
                await sleep(speed / 2);
            }
        }

        function flashTile(index, duration) {
            return new Promise(resolve => {
                const tile = document.querySelector(`[data-index="${index}"]`);
                if(tile) {
                    tile.classList.add('active');
                    setTimeout(() => {
                        tile.classList.remove('active');
                        resolve();
                    }, duration);
                }
            });
        }

        function onTileClick(e) {
            if (!isWaitingForUser) return;
            
            const clickedIndex = parseInt(e.target.dataset.index);
            userSequence.push(clickedIndex);
            
            e.target.classList.add('active');
            setTimeout(() => e.target.classList.remove('active'), 200);

            const currentStep = userSequence.length - 1;
            if (userSequence[currentStep] !== gameSequence[currentStep]) {
                gameOver();
                return;
            }

            statusText.textContent = `진행 중... (${userSequence.length}/${gameSequence.length})`;

            if (userSequence.length === gameSequence.length) {
                isWaitingForUser = false;
                setTimeout(() => {
                    nextLevel();
                }, 1000);
            }
        }

        function gameOver() {
            statusText.textContent = "틀렸습니다!";
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').textContent = `당신은 레벨 ${level}까지 도달했습니다.`;
            isWaitingForUser = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
